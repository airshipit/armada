- project:
    templates:
      - openstack-cover-jobs
      - docs-on-readthedocs
    vars:
      rtd_webhook_id: '47578'
      rtd_project_name: 'airship-armada'
    check:
      jobs:
        - openstack-tox-py312
        # - openstack-tox-docs
        - openstack-tox-pep8
        - armada-chart-build-gate
        - armada-chart-build-latest-htk
        - armada-docker-build-gate-ubuntu_noble
        - armada-airskiff-deployment-noble-kubeadm

    gate:
      jobs:
        - openstack-tox-py311
        # - openstack-tox-docs
        - openstack-tox-pep8
        - armada-chart-build-gate
        - armada-docker-build-gate-ubuntu_noble

    post:
      jobs:
        - armada-docker-publish-ubuntu_noble
        - armada-upload-git-mirror

    promote:
      jobs:
        - promote-airship-project-docs

- nodeset:
    name: armada-single-node-jammy
    nodes:
      - name: primary
        label: ubuntu-jammy

- nodeset:
    name: armada-single-node-noble
    nodes:
      - name: primary
        label: ubuntu-noble

- job:
    name: armada-chart-build-gate
    timeout: 3600
    parent: airship-chart-build-base
    nodeset: armada-single-node-noble
    required-projects:
      - name: airship/treasuremap
        override-checkout: v1.9
    vars:
      HTK_COMMIT: d89bc42b57f8c2898520181550b5019dcf31c06f


- job:
    name: armada-chart-build-latest-htk
    timeout: 3600
    voting: false
    parent: airship-chart-build-base
    nodeset: armada-single-node-noble
    required-projects:
      - name: airship/treasuremap
        override-checkout: v1.9
    vars:
      HTK_COMMIT: master

- job:
    name: armada-docker-build-gate-ubuntu_noble
    timeout: 3600
    voting: false
    parent: airship-docker-build-gate-base
    nodeset: armada-single-node-noble
    required-projects:
      - name: airship/treasuremap
        override-checkout: v1.9
    vars:
      publish: false
      distro: ubuntu_noble
      run_verbose_build: true
      trivy_fail_on_vulns: true
      trivy_severity: CRITICAL,HIGH
      tags:
        dynamic:
          patch_set: true

- job:
    name: armada-airskiff-deployment-noble-kubeadm
    description: |
      Deploy Memcached using Airskiff and submitted Armada changes.
    parent: treasuremap-airskiff-infra-deploy-base
    nodeset: treasuremap-airskiff-5nodes-ubuntu_noble
    required-projects:
      - name: airship/treasuremap
        override-checkout: v1.9
    vars:
      treasuremap_ref: v1.9
      CLONE_ARMADA: false
      MAKE_ARMADA_IMAGES: true
      USE_ARMADA_GO: false
      helm_version: 4.1.4
      HELM_ARTIFACT_URL: https://get.helm.sh/helm-v4.1.4-linux-amd64.tar.gz
      DISTRO: ubuntu_noble
      DOCKER_REGISTRY: "control-plane.minikube.internal:5000"
      gate_scripts_relative_path: ../../airship/treasuremap

- job:
    name: armada-docker-publish-ubuntu_noble
    timeout: 3600
    parent: airship-docker-build-gate-base
    nodeset: armada-single-node-noble
    required-projects:
      - name: airship/treasuremap
        override-checkout: v1.9
    secrets:
      - name: airship_armada_quay_creds_2026
        secret: airship_armada_quay_creds_2026
    vars:
      quay_creds: "{{ airship_armada_quay_creds_2026 }}"
      publish: true
      distro: ubuntu_noble
      tags:
        dynamic:
          branch: true
          commit: true
        static:
          - latest
          - airflow_3.1.5

